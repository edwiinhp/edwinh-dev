<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
<header>
    <nav class="container">
        <div class="logo">SocialNet</div>
        <ul>
            <li><a class="btn" href="login.html">Iniciar Sesion</a></li>
        </ul>
    </nav>
</header>
    <div class="main-content">
        <form class="registro" netlify>
            <h1>Registro</h1>
            <label for="nombre">Nombre completo</label>
            <input type="text" name="nombre" required>
            <label for="user">Nombre de usuario</label>
            <input type="text" name="usuario" required>
            <label for="password">Contraseña</label>
            <input type="password" name="password" minlength="8" required>
            <label for="confirmar">Confirmar contraseña</label>
            <input type="password" name="confirmar" minlength="8" required>
            <label for="correo">Correo electrónico</label>
            <input type="email" name="correo" placeholder ="ejemplo123@mail.com" required>
            <button type="submit">Registrarse</button>
            <p>¿Ya tienes una cuenta?</p>
            <a href="login.html">Iniciar Sesion</a>
        </form>
    </div>
<footer>

</footer>
</body>
</html>
